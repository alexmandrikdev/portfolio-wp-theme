name: Release Build

on:
    push:
        tags:
            - 'v*.*.*'

permissions:
    contents: write

jobs:
    build-release:
        name: Build Release Asset
        runs-on: ubuntu-24.04

        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '24'
                  cache: 'npm'

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.4'
                  extensions: mbstring, xml, curl, json, intl

            - name: Install Node.js dependencies
              run: npm ci

            - name: Install Composer dependencies (production only)
              run: composer install --no-dev --no-interaction --prefer-dist

            - name: Build theme for production
              run: npm run build

            - name: Replace version placeholders
              run: |
                  VERSION=${GITHUB_REF#refs/tags/v}
                  echo "Replacing version placeholders with: $VERSION"
                  sed -i "s/__VERSION__/$VERSION/g" style.css
                  echo "Version replacement completed"

            - name: Create compressed release asset
              run: |
                  mkdir -p portfolio-theme-build

                  cp -r assets/ portfolio-theme-build/
                  cp -r build/ portfolio-theme-build/
                  cp -r inc/ portfolio-theme-build/
                  cp -r patterns/ portfolio-theme-build/
                  cp -r templates/ portfolio-theme-build/
                  cp -r vendor/ portfolio-theme-build/
                  cp -r node_modules/ portfolio-theme-build/
                  cp functions.php portfolio-theme-build/
                  cp screenshot.png portfolio-theme-build/
                  cp style.css portfolio-theme-build/
                  cp theme.json portfolio-theme-build/
                  cp wpml-config.xml portfolio-theme-build/

                  VERSION=${GITHUB_REF#refs/tags/}
                  zip -r portfolio-$VERSION.zip portfolio-theme-build/
                  echo "Compressed release asset created: portfolio-theme-$VERSION.zip"

            - name: Upload release asset
              uses: softprops/action-gh-release@v2
              with:
                  files: portfolio-*.zip

            - name: Copy release asset to server
              uses: appleboy/scp-action@v1
              with:
                  host: ${{ secrets.SERVER_HOST }}
                  username: ${{ secrets.SERVER_USERNAME }}
                  key: ${{ secrets.SERVER_KEY }}
                  source: 'portfolio-*.zip'
                  target: '/tmp/portfolio-themes'

            - name: Copy theme to theme directory
              uses: appleboy/ssh-action@v1
              with:
                  host: ${{ secrets.SERVER_HOST }}
                  username: ${{ secrets.SERVER_USERNAME }}
                  key: ${{ secrets.SERVER_KEY }}
                  script: |
                      cd /tmp/portfolio-themes
                      CONTAINER_NAME=docker ps --filter "name=portfolio_wordpress" --format "{{.Names}}" | head -n1
                      docker run --rm --volumes-from $CONTAINER_NAME -v /tmp/portfolio-themes:/tmp alpine:3.22.2 sh -c "apk add --no-cache unzip && unzip /tmp/portfolio-themes/portfolio-*.zip -d /var/www/html/wp-content/themes/"
                      rm /tmp/portfolio-themes/portfolio-*.zip
